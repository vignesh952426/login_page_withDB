<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #7c5cff33, transparent 25%),
                  radial-gradient(circle at bottom right, #3ae5ff33, transparent 24%),
                  #08101f;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fefefe;
      text-align: center;
      padding: 32px;
    }

    .dashboard-card {
      max-width: 620px;
      width: 100%;
      padding: 2.4rem;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px);
      box-shadow: 0 36px 80px rgba(0, 0, 0, 0.22);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    p {
      color: #d7e0ff;
      line-height: 1.8;
    }

    a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.95rem 1.6rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #7c5cff, #3ae5ff);
      color: #fff;
      text-decoration: none;
      transition: transform 0.25s ease;
    }

    a:hover {
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="dashboard-card">
    <h1>Dashboard</h1>
    <p>Welcome, admin! You have successfully logged in to the demo dashboard.</p>
    <a href="index.html">Return to Login</a>
  </div>
</body>
</html>
